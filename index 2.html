<!DOCTYPE html><html lang="fa" dir="rtl"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Judge AI Demo</title><style>body{margin:0;background:#0f172a;color:#fff;font-family:Tahoma;display:flex;justify-content:center;align-items:center;height:100vh}.card{width:min(700px,92vw);background:#1e293b;padding:24px;border-radius:18px}.top{display:flex;justify-content:space-between}.case{background:#111827;padding:18px;border-radius:12px;min-height:140px;margin:20px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}button{padding:14px;background:#334155;color:#fff;border:0;border-radius:10px}</style><div class=card><div class=top><div>⭐<span id=rep>50</span></div><div>🏆<span id=score>0</span></div></div><h2>⚖️ Judge AI</h2><div id=story class=case></div><div id=choices class=grid></div><script>const st={score:0,rep:50};const S={start:{t:"پرونده سرقت؛ اولین اقدام؟",c:[["👤 بازجویی","sus"],["📄 مدارک","cam"],["👁 شاهد","wit"],["⚖ رأی","judge"]]},sus:{t:"متهم: بی‌گناهم.",c:[["📄 مدارک","cam"],["👁 شاهد","wit"],["⚖ رأی","judge"],["⬅ بازگشت","start"]]},cam:{t:"دوربین قطعی نیست.",c:[["👁 شاهد","wit"],["⚖ رأی","judge"],["👤 بازجویی","sus"],["⬅ بازگشت","start"]]},wit:{t:"شاهد مطمئن نیست.",c:[["📄 مدارک","cam"],["⚖ رأی","judge"],["👤 بازجویی","sus"],["⬅ بازگشت","start"]]}};function u(){rep.textContent=st.rep;score.textContent=st.score}function r(id){if(id==="judge"){story.innerHTML=st.score>=15?"✅ رأی منطقی":"❌ رأی عجولانه";choices.innerHTML="<button onclick='st.score=0;r(`start`)'>پرونده جدید</button>";st.rep+=st.score>=15?10:-10;u();return}let s=S[id];story.innerHTML=s.t;choices.innerHTML="";s.c.forEach(x=>{let b=document.createElement("button");b.textContent=x[0];b.onclick=()=>{if(x[1]=="sus")st.score+=5;if(x[1]=="cam")st.score+=10;if(x[1]=="wit")st.score+=8;r(x[1])};choices.appendChild(b)});u()}r("start");</script></html>
